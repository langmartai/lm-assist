<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="debugGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="controlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- ================================================================ -->
  <!-- TITLE -->
  <!-- ================================================================ -->
  <text x="480" y="32" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="0.5">lm-assist — Observability Platform for Claude Code &amp; Agent SDK</text>
  <text x="480" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Monitor, debug, and control AI coding agents with full session visibility</text>

  <!-- ================================================================ -->
  <!-- DATA SOURCES (top) — what feeds into lm-assist -->
  <!-- ================================================================ -->
  <text x="40" y="82" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">DATA SOURCES</text>

  <!-- Claude Code CLI -->
  <rect x="30" y="92" width="200" height="64" rx="8" fill="#1e293b" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="48" y="112" fill="#fbbf24" font-size="11" font-weight="700">>_ Claude Code</text>
  <text x="48" y="126" fill="#94a3b8" font-size="8">Interactive CLI sessions</text>
  <text x="48" y="138" fill="#94a3b8" font-size="8">Subagents · Teams · Worktrees</text>
  <text x="48" y="150" fill="#64748b" font-size="7">~/.claude/projects/*/sessions/*.jsonl</text>

  <!-- Agent SDK -->
  <rect x="250" y="92" width="200" height="64" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="268" y="112" fill="#c4b5fd" font-size="11" font-weight="700">{ } Agent SDK</text>
  <text x="268" y="126" fill="#94a3b8" font-size="8">Programmatic agent execution</text>
  <text x="268" y="138" fill="#94a3b8" font-size="8">Python &amp; TypeScript SDK</text>
  <text x="268" y="150" fill="#64748b" font-size="7">Same JSONL format as Claude Code</text>

  <!-- Headless / CI -->
  <rect x="470" y="92" width="200" height="64" rx="8" fill="#1e293b" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="488" y="112" fill="#818cf8" font-size="11" font-weight="700">$ Headless / CI</text>
  <text x="488" y="126" fill="#94a3b8" font-size="8">claude -p (print mode)</text>
  <text x="488" y="138" fill="#94a3b8" font-size="8">Background agents · Cron jobs</text>
  <text x="488" y="150" fill="#64748b" font-size="7">Detached execution via SDK runner</text>

  <!-- Live Processes -->
  <rect x="690" y="92" width="240" height="64" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="708" y="112" fill="#38bdf8" font-size="11" font-weight="700">Running Processes</text>
  <text x="708" y="126" fill="#94a3b8" font-size="8">PID tracking · tmux sessions</text>
  <text x="708" y="138" fill="#94a3b8" font-size="8">Process status store (real-time)</text>
  <text x="708" y="150" fill="#64748b" font-size="7">fuser / /proc / ps — zero polling overhead</text>

  <!-- Arrows: data sources → Core API -->
  <line x1="130" y1="156" x2="130" y2="188" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <polygon points="130,188 126,180 134,180" fill="#d97706" opacity="0.5"/>
  <line x1="350" y1="156" x2="350" y2="188" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
  <polygon points="350,188 346,180 354,180" fill="#a78bfa" opacity="0.5"/>
  <line x1="570" y1="156" x2="570" y2="188" stroke="#818cf8" stroke-width="1.2" opacity="0.5"/>
  <polygon points="570,188 566,180 574,180" fill="#818cf8" opacity="0.5"/>
  <line x1="810" y1="156" x2="810" y2="188" stroke="#38bdf8" stroke-width="1.2" opacity="0.5"/>
  <polygon points="810,188 806,180 814,180" fill="#38bdf8" opacity="0.5"/>

  <!-- ================================================================ -->
  <!-- CORE API (center engine) -->
  <!-- ================================================================ -->
  <rect x="30" y="190" width="900" height="80" rx="10" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <rect x="850" y="196" width="68" height="18" rx="9" fill="#4c1d95" opacity="0.8"/>
  <text x="884" y="208" text-anchor="middle" fill="#c4b5fd" font-size="8" font-weight="600">:3100</text>
  <text x="50" y="212" fill="#ddd6fe" font-size="8" font-weight="600" opacity="0.8">lm-assist CORE API — 155+ ENDPOINTS</text>
  <text x="480" y="234" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Session Engine</text>

  <!-- Sub-components inside Core API -->
  <rect x="50" y="244" width="130" height="20" rx="5" fill="#4c1d95" opacity="0.6"/>
  <text x="115" y="258" text-anchor="middle" fill="#ddd6fe" font-size="8">JSONL Parser</text>
  <rect x="190" y="244" width="130" height="20" rx="5" fill="#4c1d95" opacity="0.6"/>
  <text x="255" y="258" text-anchor="middle" fill="#ddd6fe" font-size="8">Session Cache (LMDB)</text>
  <rect x="330" y="244" width="130" height="20" rx="5" fill="#4c1d95" opacity="0.6"/>
  <text x="395" y="258" text-anchor="middle" fill="#ddd6fe" font-size="8">DAG Builder</text>
  <rect x="470" y="244" width="130" height="20" rx="5" fill="#4c1d95" opacity="0.6"/>
  <text x="535" y="258" text-anchor="middle" fill="#ddd6fe" font-size="8">Cost Calculator</text>
  <rect x="610" y="244" width="130" height="20" rx="5" fill="#4c1d95" opacity="0.6"/>
  <text x="675" y="258" text-anchor="middle" fill="#ddd6fe" font-size="8">SSE Streaming</text>
  <rect x="750" y="244" width="165" height="20" rx="5" fill="#4c1d95" opacity="0.6"/>
  <text x="832" y="258" text-anchor="middle" fill="#ddd6fe" font-size="8">SDK Runner / Execution</text>

  <!-- ================================================================ -->
  <!-- THREE PILLARS — Monitor · Debug · Control -->
  <!-- ================================================================ -->
  <text x="40" y="296" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">THREE PILLARS</text>

  <!-- MONITOR pillar -->
  <rect x="30" y="306" width="290" height="172" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="306" width="290" height="30" rx="10" fill="url(#monitorGrad)" opacity="0.9"/>
  <rect x="30" y="322" width="290" height="14" rx="0" fill="url(#monitorGrad)" opacity="0.9"/>
  <text x="175" y="326" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">MONITOR</text>

  <text x="48" y="356" fill="#e2e8f0" font-size="9" font-weight="600">Real-time execution tracking</text>
  <text x="48" y="372" fill="#94a3b8" font-size="8.5">Session list with slug names &amp; live status</text>
  <text x="48" y="386" fill="#94a3b8" font-size="8.5">Running process detection (PID, tmux)</text>
  <text x="48" y="400" fill="#94a3b8" font-size="8.5">Per-model cost &amp; token breakdown</text>
  <text x="48" y="414" fill="#94a3b8" font-size="8.5">SSE event stream for live updates</text>
  <text x="48" y="428" fill="#94a3b8" font-size="8.5">Multi-machine fleet dashboard</text>
  <text x="48" y="448" fill="#0ea5e9" font-size="8" font-weight="600">GET /monitor/executions</text>
  <text x="48" y="460" fill="#0ea5e9" font-size="8" font-weight="600">GET /stream?executionId=...</text>
  <text x="48" y="472" fill="#0ea5e9" font-size="8" font-weight="600">GET /sessions · /projects/sessions</text>

  <!-- DEBUG pillar -->
  <rect x="335" y="306" width="290" height="172" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="335" y="306" width="290" height="30" rx="10" fill="url(#debugGrad)" opacity="0.9"/>
  <rect x="335" y="322" width="290" height="14" rx="0" fill="url(#debugGrad)" opacity="0.9"/>
  <text x="480" y="326" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">DEBUG</text>

  <text x="353" y="356" fill="#e2e8f0" font-size="9" font-weight="600">15 specialized insight views</text>
  <text x="353" y="372" fill="#94a3b8" font-size="8.5">Chat · Thinking · Agents · Plans · Team</text>
  <text x="353" y="386" fill="#94a3b8" font-size="8.5">Tool call traces with inputs &amp; results</text>
  <text x="353" y="400" fill="#94a3b8" font-size="8.5">Subagent hierarchy &amp; session DAG</text>
  <text x="353" y="414" fill="#94a3b8" font-size="8.5">File changes · Git ops · DB operations</text>
  <text x="353" y="428" fill="#94a3b8" font-size="8.5">Fork tracking &amp; branch visualization</text>
  <text x="353" y="448" fill="#f59e0b" font-size="8" font-weight="600">GET /sessions/:id (15 data dimensions)</text>
  <text x="353" y="460" fill="#f59e0b" font-size="8" font-weight="600">GET /sessions/:id/dag · /session-dag</text>
  <text x="353" y="472" fill="#f59e0b" font-size="8" font-weight="600">GET /sessions/:id/subagents</text>

  <!-- CONTROL pillar -->
  <rect x="640" y="306" width="290" height="172" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="640" y="306" width="290" height="30" rx="10" fill="url(#controlGrad)" opacity="0.9"/>
  <rect x="640" y="322" width="290" height="14" rx="0" fill="url(#controlGrad)" opacity="0.9"/>
  <text x="785" y="326" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">CONTROL</text>

  <text x="658" y="356" fill="#e2e8f0" font-size="9" font-weight="600">Full runtime management API</text>
  <text x="658" y="372" fill="#94a3b8" font-size="8.5">Start / abort agent executions</text>
  <text x="658" y="386" fill="#94a3b8" font-size="8.5">Web terminal (ttyd) from any browser</text>
  <text x="658" y="400" fill="#94a3b8" font-size="8.5">SDK runner for programmatic execution</text>
  <text x="658" y="414" fill="#94a3b8" font-size="8.5">Session cache warm / clear</text>
  <text x="658" y="428" fill="#94a3b8" font-size="8.5">Remote access via LangMart Hub</text>
  <text x="658" y="448" fill="#10b981" font-size="8" font-weight="600">POST /monitor/abort/:executionId</text>
  <text x="658" y="460" fill="#10b981" font-size="8" font-weight="600">POST /ttyd/start · /ttyd/stop</text>
  <text x="658" y="472" fill="#10b981" font-size="8" font-weight="600">POST /agent/execute · /hub/connect</text>

  <!-- ================================================================ -->
  <!-- WEB UI + ACCESS LAYER -->
  <!-- ================================================================ -->

  <!-- Arrow: Pillars → Web UI -->
  <line x1="480" y1="478" x2="480" y2="498" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="480,498 476,490 484,490" fill="#60a5fa" opacity="0.5"/>

  <!-- Web UI bar -->
  <rect x="30" y="500" width="660" height="60" rx="10" fill="url(#webGrad)" filter="url(#shadow)" opacity="0.95"/>
  <rect x="620" y="506" width="58" height="16" rx="8" fill="#1e40af" opacity="0.8"/>
  <text x="649" y="517" text-anchor="middle" fill="#93c5fd" font-size="7" font-weight="600">:3848</text>
  <text x="50" y="520" fill="#bfdbfe" font-size="8" font-weight="600" opacity="0.8">WEB UI — FULL DASHBOARD</text>
  <text x="360" y="538" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Sessions · Agents · Tasks · Terminal · Skills · DAG · Settings</text>
  <text x="360" y="552" text-anchor="middle" fill="#bfdbfe" font-size="8.5">15 insight tabs per session · responsive mobile/tablet · real-time updates</text>

  <!-- Access methods -->
  <rect x="710" y="500" width="220" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="728" y="518" fill="#e2e8f0" font-size="9" font-weight="600">Access From Anywhere</text>
  <rect x="728" y="526" width="60" height="14" rx="4" fill="#38bdf8" opacity="0.2"/>
  <text x="758" y="536" text-anchor="middle" fill="#38bdf8" font-size="7.5" font-weight="600">localhost</text>
  <rect x="796" y="526" width="40" height="14" rx="4" fill="#818cf8" opacity="0.2"/>
  <text x="816" y="536" text-anchor="middle" fill="#818cf8" font-size="7.5" font-weight="600">LAN</text>
  <rect x="844" y="526" width="72" height="14" rx="4" fill="#34d399" opacity="0.2"/>
  <text x="880" y="536" text-anchor="middle" fill="#34d399" font-size="7.5" font-weight="600">langmart.ai</text>
  <text x="728" y="554" fill="#64748b" font-size="7.5">Phone · Tablet · Desktop · Any browser</text>

  <!-- ================================================================ -->
  <!-- OPTIONAL SUBSYSTEM: Knowledge (small, de-emphasized) -->
  <!-- ================================================================ -->
  <rect x="30" y="580" width="420" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" opacity="0.6"/>
  <rect x="38" y="586" width="58" height="14" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="67" y="596" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="600">OPTIONAL</text>
  <text x="108" y="596" fill="#94a3b8" font-size="9" font-weight="600">Knowledge Subsystem</text>
  <text x="48" y="614" fill="#64748b" font-size="8">Auto-extract knowledge from sessions · BM25 + vector search · MCP tools · context injection hook</text>
  <text x="48" y="624" fill="#64748b" font-size="7.5">Enable/disable at runtime via Settings kill switch — unloads embedder + LanceDB to save ~100MB memory</text>

  <!-- ================================================================ -->
  <!-- MULTI-MACHINE (compact) -->
  <!-- ================================================================ -->
  <rect x="470" y="580" width="460" height="50" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1" opacity="0.7"/>
  <text x="488" y="596" fill="#34d399" font-size="9" font-weight="600">Multi-Machine Fleet via LangMart Hub</text>
  <text x="488" y="614" fill="#94a3b8" font-size="8">Connect multiple dev machines · browse sessions across all hosts · unified cost tracking</text>
  <text x="488" y="624" fill="#64748b" font-size="7.5">WebSocket relay — your data stays on your machines · no data stored in cloud</text>

  <!-- ================================================================ -->
  <!-- BOTTOM: KEY APIS + WHO IT'S FOR -->
  <!-- ================================================================ -->
  <line x1="40" y1="648" x2="920" y2="648" stroke="#334155" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>

  <text x="40" y="670" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">KEY API SURFACE</text>

  <!-- API categories -->
  <rect x="30" y="680" width="220" height="56" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
  <text x="48" y="696" fill="#0ea5e9" font-size="9" font-weight="700">Sessions (27 endpoints)</text>
  <text x="48" y="710" fill="#94a3b8" font-size="7.5">List · detail · delta · batch-check</text>
  <text x="48" y="722" fill="#94a3b8" font-size="7.5">conversation · subagents · forks · DAG</text>
  <text x="48" y="730" fill="#64748b" font-size="7">ifModifiedSince · SSE stream · cache warm</text>

  <rect x="260" y="680" width="220" height="56" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="278" y="696" fill="#f59e0b" font-size="9" font-weight="700">Monitor (6 endpoints)</text>
  <text x="278" y="710" fill="#94a3b8" font-size="7.5">executions · summary · abort</text>
  <text x="278" y="722" fill="#94a3b8" font-size="7.5">Real-time status · cost · turn count</text>
  <text x="278" y="730" fill="#64748b" font-size="7">Detects claude-native / claude PIDs</text>

  <rect x="490" y="680" width="220" height="56" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.7"/>
  <text x="508" y="696" fill="#10b981" font-size="9" font-weight="700">Projects (12 endpoints)</text>
  <text x="508" y="710" fill="#94a3b8" font-size="7.5">List projects · sessions per project</text>
  <text x="508" y="722" fill="#94a3b8" font-size="7.5">Git info · worktree detection</text>
  <text x="508" y="730" fill="#64748b" font-size="7">Tasks · settings · excluded paths</text>

  <rect x="720" y="680" width="210" height="56" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <text x="738" y="696" fill="#a78bfa" font-size="9" font-weight="700">Terminal (13 endpoints)</text>
  <text x="738" y="710" fill="#94a3b8" font-size="7.5">ttyd start / stop / status</text>
  <text x="738" y="722" fill="#94a3b8" font-size="7.5">WebSocket proxy · process list</text>
  <text x="738" y="730" fill="#64748b" font-size="7">tmux attach · remote relay via Hub</text>

  <!-- ================================================================ -->
  <!-- LEGEND -->
  <!-- ================================================================ -->
  <rect x="30" y="754" width="900" height="52" rx="8" fill="#0f172a" opacity="0.6"/>
  <text x="50" y="772" fill="#94a3b8" font-size="9" font-weight="600">WHO IT'S FOR</text>

  <circle cx="50" cy="792" r="4" fill="#d97706"/>
  <text x="62" y="796" fill="#94a3b8" font-size="8.5">Solo developers using Claude Code</text>

  <circle cx="280" cy="792" r="4" fill="#a78bfa"/>
  <text x="292" y="796" fill="#94a3b8" font-size="8.5">Teams building with Agent SDK</text>

  <circle cx="500" cy="792" r="4" fill="#10b981"/>
  <text x="512" y="796" fill="#94a3b8" font-size="8.5">DevOps managing agent fleets</text>

  <circle cx="720" cy="792" r="4" fill="#0ea5e9"/>
  <text x="732" y="796" fill="#94a3b8" font-size="8.5">AI product builders debugging agents</text>

  <!-- Tagline -->
  <text x="480" y="818" text-anchor="middle" fill="#64748b" font-size="8">Core API :3100 · Web UI :3848 · npm install -g lm-assist · github.com/langmartai/lm-assist</text>
</svg>
